<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB History - Teacher Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        /* Custom scrollbar for modal */
        #modal-content::-webkit-scrollbar {
            width: 8px;
        }
        #modal-content::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <header class="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-700 pb-6 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white">Exam Control Tower</h1>
            <p class="text-slate-400 font-medium">IB History Paper 1: The Move to Global War</p>
        </div>
        <div class="flex gap-4 w-full md:w-auto">
            <button id="export-btn" class="flex-1 md:flex-none bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center justify-center gap-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                Export CSV
            </button>
            <div class="bg-slate-800 px-6 py-2 rounded-lg border border-slate-700 shadow-inner">
                <span class="text-[10px] text-slate-500 block uppercase font-black tracking-widest">Active Sessions</span>
                <span id="active-count" class="text-2xl font-mono font-bold text-blue-400">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="student-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center text-slate-500">
                <div class="status-pulse mb-4 text-xl font-medium">Establishing Secure Connection...</div>
                <p class="text-sm">Waiting for student data from Firebase</p>
            </div>
        </div>
    </main>

    <!-- Detailed View Modal -->
    <div id="view-modal" class="fixed inset-0 bg-slate-950/90 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white text-slate-900 w-full max-w-5xl h-[90vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <h2 id="modal-student-name" class="text-2xl font-bold text-slate-800">Student Name</h2>
                    <p id="modal-meta" class="text-xs text-slate-500 uppercase font-bold tracking-widest mt-1"></p>
                </div>
                <button id="close-modal" class="bg-slate-200 hover:bg-red-100 hover:text-red-600 p-2 rounded-full transition-colors text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto space-y-10 font-serif text-lg leading-relaxed bg-white">
                <!-- Responses populate here -->
            </div>
            <div class="p-4 bg-slate-50 border-t text-right">
                <button id="close-modal-btn" class="bg-slate-800 text-white px-6 py-2 rounded font-bold hover:bg-slate-700 transition">Close View</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCSNhgsM-UXpe8XmsW2hj4lAHD3TW6bg7w",
            authDomain: "ib-paper-1-exams.firebaseapp.com",
            projectId: "ib-paper-1-exams",
            storageBucket: "ib-paper-1-exams.firebasestorage.app",
            messagingSenderId: "452822797263",
            appId: "1:452822797263:web:f74698a79ed6692c7720ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'ib-history-portal';

        let allData = [];

        async function init() {
            try {
                await signInAnonymously(auth);
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'submissions'));
                
                onSnapshot(q, (snapshot) => {
                    allData = [];
                    snapshot.forEach(doc => {
                        allData.push({ id: doc.id, ...doc.data() });
                    });
                    renderDashboard();
                }, (err) => {
                    console.error("Snapshot error:", err);
                    document.getElementById('student-grid').innerHTML = `<div class="col-span-full text-red-500 text-center">Firestore Access Denied. Check Security Rules.</div>`;
                });
            } catch (err) {
                console.error("Auth error:", err);
            }
        }

        function renderDashboard() {
            const grid = document.getElementById('student-grid');
            const countDisplay = document.getElementById('active-count');
            
            if (allData.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-600 border-2 border-dashed border-slate-800 rounded-xl">No active exam sessions found.</div>`;
                countDisplay.innerText = "0";
                return;
            }

            countDisplay.innerText = allData.length;
            grid.innerHTML = '';

            // Sort by most recent sync
            allData.sort((a, b) => {
                const timeA = a.timestamp?.toMillis() || 0;
                const timeB = b.timestamp?.toMillis() || 0;
                return timeB - timeA;
            });

            allData.forEach(student => {
                const syncTime = student.timestamp ? new Date(student.timestamp.toMillis()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : 'Waiting...';
                const isViolation = student.status?.includes('Violation');
                const isFinal = student.status?.includes('FINAL');
                
                const card = document.createElement('div');
                card.className = `group p-6 rounded-xl border transition-all duration-300 cursor-pointer shadow-lg hover:scale-[1.02] ${isViolation ? 'bg-red-950/40 border-red-500' : 'bg-slate-800 border-slate-700 hover:border-blue-500'}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="max-w-[70%]">
                            <h3 class="font-bold text-xl text-white truncate">${student.studentName}</h3>
                            <p class="text-[10px] text-slate-500 font-mono mt-1 truncate">${student.id}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter ${isFinal ? 'bg-emerald-500 text-white' : 'bg-blue-600 text-white shadow-lg shadow-blue-900/50'}">
                            ${isFinal ? 'Submitted' : 'Exam In Progress'}
                        </span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                            <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Total Words</p>
                            <p class="text-2xl font-mono font-bold text-white">${student.totalWords || 0}</p>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                            <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Last Sync</p>
                            <p class="text-sm font-mono font-bold text-blue-300 mt-1">${syncTime}</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between text-[11px] font-bold">
                        <div class="flex items-center gap-2">
                            <div class="h-2 w-2 rounded-full ${isFinal ? 'bg-slate-500' : 'bg-green-500 status-pulse'}"></div>
                            <span class="${isViolation ? 'text-red-400' : 'text-slate-400'} uppercase tracking-wider">${student.status || 'Active'}</span>
                        </div>
                        <span class="bg-slate-700 px-2 py-1 rounded text-slate-300">${Math.floor((student.timeLeft || 3600) / 60)}m left</span>
                    </div>
                `;

                card.onclick = () => openModal(student);
                grid.appendChild(card);
            });
        }

        function openModal(student) {
            const modal = document.getElementById('view-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-student-name').innerText = student.studentName;
            document.getElementById('modal-meta').innerText = `${student.status} | Sync: ${student.timestamp ? new Date(student.timestamp.toMillis()).toLocaleString() : 'N/A'}`;
            
            content.innerHTML = '';
            const labels = {
                q1a: "Question 1a: Document Analysis [3 Marks]",
                q1b: "Question 1b: Cartoon/Map Message [2 Marks]",
                q2: "Question 2: OPVL Evaluation [4 Marks]",
                q3: "Question 3: Compare and Contrast [6 Marks]",
                q4: "Question 4: Synthesis Essay [9 Marks]"
            };

            Object.entries(labels).forEach(([qid, label]) => {
                const section = document.createElement('div');
                const text = student.responses?.[qid] || '';
                const wordCount = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                
                section.innerHTML = `
                    <div class="flex justify-between items-end border-b-2 border-slate-100 pb-2 mb-4">
                        <h4 class="text-blue-700 uppercase text-xs font-black tracking-widest">${label}</h4>
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded">${wordCount} words</span>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-xl text-slate-800 shadow-inner min-h-[100px] border border-slate-100">
                        ${text ? text.replace(/\n/g, '<br>') : '<span class="text-slate-400 italic">No response provided yet.</span>'}
                    </div>
                `;
                content.appendChild(section);
            });

            modal.classList.remove('hidden');
        }

        const closeModal = () => document.getElementById('view-modal').classList.add('hidden');
        document.getElementById('close-modal').onclick = closeModal;
        document.getElementById('close-modal-btn').onclick = closeModal;

        document.getElementById('export-btn').onclick = () => {
            if (allData.length === 0) {
                alert("No data to export yet.");
                return;
            }
            
            let csv = "Student Name,Status,Total Words,Time Left,Q1a,Q1b,Q2,Q3,Q4\n";
            allData.forEach(row => {
                const line = [
                    `"${row.studentName}"`,
                    `"${row.status}"`,
                    `"${row.totalWords}"`,
                    `"${row.timeLeft}"`,
                    `"${(row.responses?.q1a || '').replace(/"/g, '""')}"`,
                    `"${(row.responses?.q1b || '').replace(/"/g, '""')}"`,
                    `"${(row.responses?.q2 || '').replace(/"/g, '""')}"`,
                    `"${(row.responses?.q3 || '').replace(/"/g, '""')}"`,
                    `"${(row.responses?.q4 || '').replace(/"/g, '""')}"`
                ].join(",");
                csv += line + "\n";
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `IB_Exam_Results_${new Date().toISOString().split('T')[0]}.csv`);
            a.click();
        };

        init();
    </script>
</body>
</html>
